<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Blog Post Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .post-item {
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .post-actions {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Blog Post Admin Dashboard</h1>
        
        <!-- Add/Edit Post Form -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 id="formTitle">Add New Post</h5>
            </div>
            <div class="card-body">
                <form id="postForm">
                    <input type="hidden" id="postId">
                    <div class="mb-3">
                        <label for="postTitle" class="form-label">Post Title</label>
                        <input type="text" class="form-control" id="postTitle" placeholder="Enter post title" required>
                    </div>
                    <div class="mb-3">
                        <label for="postContent" class="form-label">Post Content</label>
                        <textarea class="form-control" id="postContent" rows="5" placeholder="Enter post content" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" id="submitBtn">Save Post</button>
                    <button type="button" class="btn btn-secondary ms-2" id="cancelBtn" style="display: none;">Cancel</button>
                </form>
            </div>
        </div>

        <!-- Posts List -->
        <div class="card">
            <div class="card-header">
                <h5>Existing Posts</h5>
            </div>
            <div class="card-body">
                <div id="postList">
                    <!-- Posts will be listed here -->
                </div>
                <div id="noPosts" class="text-center text-muted">
                    No posts available. Add your first post above.
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // DOM elements
        const postForm = document.getElementById('postForm');
        const postId = document.getElementById('postId');
        const postTitle = document.getElementById('postTitle');
        const postContent = document.getElementById('postContent');
        const submitBtn = document.getElementById('submitBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const formTitle = document.getElementById('formTitle');
        const postList = document.getElementById('postList');
        const noPosts = document.getElementById('noPosts');

        // Load posts from localStorage
        function loadPosts() {
            const posts = JSON.parse(localStorage.getItem('blogPosts') || '[]');
            postList.innerHTML = '';
            
            if (posts.length === 0) {
                noPosts.style.display = 'block';
                return;
            }
            
            noPosts.style.display = 'none';
            
            posts.forEach((post, index) => {
                const postDiv = document.createElement('div');
                postDiv.className = 'post-item';
                postDiv.innerHTML = `
                    <h6>${post.title}</h6>
                    <p class="text-muted small">Created: ${new Date(post.createdAt).toLocaleString()}</p>
                    <p>${post.content.substring(0, 100)}${post.content.length > 100 ? '...' : ''}</p>
                    <div class="post-actions">
                        <button class="btn btn-sm btn-outline-primary me-2" onclick="editPost(${index})">Edit</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deletePost(${index})">Delete</button>
                    </div>
                `;
                postList.appendChild(postDiv);
            });
        }

        // Save post
        function savePost(event) {
            event.preventDefault();
            
            const posts = JSON.parse(localStorage.getItem('blogPosts') || '[]');
            const postData = {
                title: postTitle.value,
                content: postContent.value,
                createdAt: new Date().toISOString()
            };
            
            const id = postId.value;
            if (id) {
                // Update existing post
                posts[id] = { ...posts[id], ...postData };
            } else {
                // Add new post
                posts.push(postData);
            }
            
            localStorage.setItem('blogPosts', JSON.stringify(posts));
            resetForm();
            loadPosts();
        }

        // Edit post
        function editPost(index) {
            const posts = JSON.parse(localStorage.getItem('blogPosts') || '[]');
            const post = posts[index];
            
            postId.value = index;
            postTitle.value = post.title;
            postContent.value = post.content;
            formTitle.textContent = 'Edit Post';
            submitBtn.textContent = 'Update Post';
            cancelBtn.style.display = 'inline-block';
            
            // Scroll to form
            document.querySelector('.card-header').scrollIntoView({ behavior: 'smooth' });
        }

        // Delete post
        function deletePost(index) {
            if (confirm('Are you sure you want to delete this post?')) {
                const posts = JSON.parse(localStorage.getItem('blogPosts') || '[]');
                posts.splice(index, 1);
                localStorage.setItem('blogPosts', JSON.stringify(posts));
                loadPosts();
            }
        }

        // Reset form
        function resetForm() {
            postForm.reset();
            postId.value = '';
            formTitle.textContent = 'Add New Post';
            submitBtn.textContent = 'Save Post';
            cancelBtn.style.display = 'none';
        }

        // Event listeners
        postForm.addEventListener('submit', savePost);
        cancelBtn.addEventListener('click', resetForm);

        // Initialize
        loadPosts();
    </script>
</body>
</html>
