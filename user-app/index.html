<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User - Blog Posts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">Blog Post App</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" href="#">Home</a>
                <a class="nav-link" href="../admin-app/index.html">Admin</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="mb-4">Blog Posts</h1>
        <div class="row">
            <div class="col-md-8">
                <div id="postsContainer">
                    <!-- Blog posts will be displayed here -->
                </div>
                <div id="noPosts" class="text-center text-muted" style="display: none;">
                    No posts available yet. Check back later or visit the admin panel to add posts.
                </div>
            </div>
            <div class="col-md-4">
                <h3>Sidebar</h3>
                <p>Welcome to our blog! Here you can read the latest posts.</p>
                <p>Use the Admin link above to manage posts.</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
