<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User - Blog Posts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Blog Posts</h1>
        <div class="row">
            <div class="col-md-8">
                <div id="postsContainer">
                    <!-- Blog posts will be displayed here -->
                    <div class="card mb-4">
                        <div class="card-body">
                            <h5 class="card-title">Sample Post Title</h5>
                            <p class="card-text">This is a sample blog post content. In a real application, posts would be loaded from a database or API.</p>
                            <a href="#" class="btn btn-primary">Read More</a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <h3>Sidebar</h3>
                <p>Additional content or navigation can go here.</p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
